services:
  site-agence:
    image: php:8.2-apache
    container_name: jadi_digital_apache
    ports:
      - "5005:80"
    volumes:
      - .:/var/www/html
    # Cette commande active le module de réécriture pour le .htaccess
    command: >
      sh -c "a2enmod rewrite && apache2-foreground"
    # Optionnel mais recommandé pour éviter les soucis de droits sur Linux
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
